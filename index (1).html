<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="i care pet">
<title>i care pet 管理系統</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0c0e18;--bg2:#141720;--bg3:#1e2133;--bg4:#272b40;--acc:#6c63ff;--acc2:#9b94ff;--acc3:#4a42cc;--text:#eceaff;--text2:#9390bf;--text3:#5e5c85;--border:#2e3150;--green:#3ddc84;--red:#ff6b6b;--blue:#5aa9ff;font-family:'Noto Sans HK',system-ui,sans-serif}
html,body{height:100%;background:var(--bg);color:var(--text)}
.app-shell{display:flex;flex-direction:column;height:100vh}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;justify-content:space-between;align-items:center}
.page-title{font-size:16px;font-weight:700}
.avatar{width:30px;height:30px;border-radius:50%;background:var(--acc3);display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700}
.content{flex:1;overflow-y:auto;padding:12px;padding-bottom:70px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex}
.bn-item{flex:1;padding:8px;text-align:center;cursor:pointer;color:var(--text3);font-size:10px}
.bn-item.active{color:var(--acc2)}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px}
.card-title{font-size:13px;font-weight:600;color:var(--text2);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px}
input,select,textarea{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:14px;margin-bottom:8px;font-family:inherit}
.btn{padding:10px 16px;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;font-family:inherit}
.btn-primary{background:var(--acc);color:#fff}
.btn-success{background:#1a4d2e;color:var(--green)}
.btn-full{width:100%;margin-bottom:0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ok-box{background:#14532d22;border:1px solid #3ddc8444;border-radius:10px;padding:10px 12px;color:var(--green);font-size:12px;margin-top:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:8px 10px;text-align:left;border-bottom:1px solid var(--border)22}
th{color:var(--text3);font-weight:500}
.hidden{display:none}
.prod-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-height:250px;overflow-y:auto;margin-bottom:10px}
.prod-btn{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:8px;text-align:center;cursor:pointer;color:var(--text);font-size:11px}
.prod-btn:active{border-color:var(--acc);background:var(--bg4)}
.cart-item{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg3);border-radius:10px;margin-bottom:6px;font-size:12px}
.cart-item .qty-btn{width:26px;height:26px;background:var(--bg4);border:1px solid var(--border);cursor:pointer;color:var(--text);border-radius:4px}
.login-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:flex-end;justify-content:center}
.login-sheet{background:var(--bg2);border-radius:24px 24px 0 0;padding:32px 24px;width:100%;border-top:1px solid var(--border)}
.login-logo{text-align:center;margin-bottom:20px}
.u-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:20px}
.u-card{background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:12px;text-align:center;cursor:pointer}
.u-card.sel{border-color:var(--acc)}
.u-av{width:40px;height:40px;border-radius:50%;margin:0 auto 8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700}
.more-menu{position:fixed;inset:0;background:rgba(0,0,0,0.6);display:flex;flex-direction:column;justify-content:flex-end;z-index:99}
.more-sheet{background:var(--bg2);border-radius:20px 20px 0 0;padding:20px 16px 32px;border-top:1px solid var(--border)}
.more-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.more-btn{background:var(--bg3);border-radius:10px;padding:12px 8px;text-align:center;cursor:pointer;border:1px solid var(--border)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);display:flex;align-items:flex-end;z-index:100}
.modal{background:var(--bg2);border-radius:20px 20px 0 0;width:100%;padding:20px 16px 32px;border-top:1px solid var(--border)}
</style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-sheet">
    <div class="login-logo">
      <div style="font-size:48px;margin-bottom:8px">🐾</div>
      <div style="font-size:22px;font-weight:700;color:var(--acc2)">i care pet</div>
      <div style="font-size:12px;color:var(--text3);margin-top:3px">寵物店管理系統</div>
    </div>
    <div class="u-cards" id="uCards"></div>
    <div style="margin-bottom:12px">
      <label>密碼</label>
      <input type="password" id="loginPwd" placeholder="輸入密碼..." style="margin-bottom:0" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="btn btn-primary btn-full" style="padding:14px" onclick="doLogin()">登入</button>
    <p id="loginErr" style="color:var(--red);font-size:11px;text-align:center;margin-top:8px;display:none">密碼錯誤</p>
  </div>
</div>

<div class="app-shell hidden" id="mainApp">
  <div class="topbar">
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:18px">🐾</span>
      <div class="page-title" id="pageTitle">交易</div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <div style="font-size:11px;color:var(--text3)" id="topDate"></div>
      <div class="avatar" id="topAvatar">A</div>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
  <div class="bottom-nav" id="bottomNav"></div>
</div>

<div id="modalContainer"></div>

<script>
// ===== 數據同步系統 =====
function loadData(){
  const saved=localStorage.getItem('icarepetData');
  return saved?JSON.parse(saved):{
    users:[
      {id:1,name:'陳店長',role:'管理員',pwd:'1234'},
      {id:2,name:'李美容師',role:'美容師',pwd:'2222'},
      {id:3,name:'王收銀員',role:'收銀員',pwd:'3333'}
    ],
    products:[
      {id:'P001',name:'狗糧 Hill\'s 7kg',price:280,stock:45},
      {id:'P002',name:'貓糧 Royal Canin',price:320,stock:30},
      {id:'P003',name:'除蚤頸圈',price:95,stock:60},
      {id:'P004',name:'磨牙骨',price:65,stock:80},
      {id:'P005',name:'狗廁所墊',price:120,stock:25},
      {id:'P006',name:'沖涼服務',price:180,stock:999},
      {id:'P007',name:'全剷服務',price:380,stock:999},
    ],
    customers:[
      {id:'C001',name:'張小明',phone:'91234567',ticket:null},
      {id:'C002',name:'李美華',phone:'98765432',ticket:{balance:850}},
    ],
    transactions:[],
    appointments:[],
    cart:[],
    selPay:'現金',
    currentUser:null,
  };
}

function saveData(){
  localStorage.setItem('icarepetData',JSON.stringify(D));
}

const D=loadData();
let selUid=null;

// ===== LOGIN =====
(function(){
  const uc=document.getElementById('uCards');
  const colors=['#6c63ff','#29d9c2','#ff6b9d'];
  D.users.forEach((u,i)=>{
    uc.innerHTML+=`<div class="u-card" id="ub${u.id}" onclick="selUser(${u.id})">
      <div class="u-av" style="background:${colors[i]}22;color:${colors[i]}">${u.name[0]}</div>
      <div style="font-size:11px;font-weight:600;color:var(--text)">${u.name}</div>
      <div style="font-size:10px;color:var(--text3)">${u.role}</div></div>`;
  });
})();

function selUser(id){selUid=id;document.querySelectorAll('.u-card').forEach(e=>e.classList.remove('sel'));document.getElementById('ub'+id).classList.add('sel');}

function doLogin(){
  if(!selUid)return;
  const u=D.users.find(x=>x.id===selUid);
  if(document.getElementById('loginPwd').value!==u.pwd){document.getElementById('loginErr').style.display='block';return;}
  D.currentUser=u;
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('mainApp').classList.remove('hidden');
  document.getElementById('topAvatar').textContent=u.name[0];
  document.getElementById('topDate').textContent=new Date().toLocaleDateString('zh-HK',{month:'short',day:'numeric'});
  buildNav();nav('pos');
}

function logout(){
  saveData();
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('mainApp').classList.add('hidden');
  document.getElementById('loginPwd').value='';
  selUid=null;
  document.querySelectorAll('.u-card').forEach(e=>e.classList.remove('sel'));
}

// ===== NAV =====
const TABS=[{id:'pos',icon:'🛒',label:'交易'},{id:'history',icon:'📝',label:'紀錄'},{id:'appointments',icon:'📅',label:'預約'},{id:'inventory',icon:'📦',label:'貨存'},{id:'more',icon:'☰',label:'更多'}];

function buildNav(){
  const nav=document.getElementById('bottomNav');
  nav.innerHTML=TABS.map(t=>`<div class="bn-item${t.id==='pos'?' active':''}" id="bn-${t.id}" onclick="bnClick('${t.id}')" style="cursor:pointer"><div style="font-size:18px">${t.icon}</div>${t.label}</div>`).join('');
}

function bnClick(id){
  if(id==='more'){showMore();return;}
  TABS.forEach(t=>{const el=document.getElementById('bn-'+t.id);if(el)el.classList.toggle('active',t.id===id);});
  nav(id);
}

function showMore(){
  const mc=document.getElementById('modalContainer');
  mc.innerHTML=`<div class="more-menu" onclick="if(event.target===this)closeMore()">
    <div class="more-sheet">
      <h3 style="font-size:13px;color:var(--text3);margin-bottom:12px;text-transform:uppercase;letter-spacing:1px">更多</h3>
      <div class="more-grid">
        <div class="more-btn" onclick="closeMore();nav('customers')" style="cursor:pointer">👥 客人</div>
        <div class="more-btn" onclick="closeMore();nav('tickets')" style="cursor:pointer">🎟 套票</div>
        <div class="more-btn" onclick="closeMore();nav('expenses')" style="cursor:pointer">💸 支出</div>
        <div class="more-btn" onclick="closeMore();nav('settings')" style="cursor:pointer">⚙️ 設定</div>
      </div>
    </div>
  </div>`;
}

function closeMore(){document.getElementById('modalContainer').innerHTML='';}

function nav(page){
  TABS.forEach(t=>{const el=document.getElementById('bn-'+t.id);if(el)el.classList.toggle('active',t.id===page);});
  document.getElementById('pageTitle').textContent=['交易','交易紀錄','預約','貨存','客人','套票','支出','設定'][['pos','history','appointments','inventory','customers','tickets','expenses','settings'].indexOf(page)]||page;
  const c=document.getElementById('mainContent');c.innerHTML='';
  const fn={pos:renderPOS,history:renderHistory,appointments:renderAppointments,inventory:renderInventory,customers:renderCustomers,tickets:renderTickets,expenses:renderExpenses,settings:renderSettings};
  if(fn[page])fn[page](c);
}

function todayStr(){return new Date().toISOString().slice(0,10)}

// ===== POS =====
function renderPOS(c){
  D.cart=[];D.selPay='現金';
  c.innerHTML=`
  <div class="card">
    <div class="card-title">客人資料</div>
    <div class="grid2"><div><label>電話</label><input id="posPhone" placeholder="輸入電話..." oninput="posAutoFill()" style="font-size:16px"></div>
      <div><label>姓名</label><input id="posName" placeholder="自動填寫..."></div></div>
    <div class="grid2"><div><label>日期</label><input id="posDate" type="date" value="${todayStr()}"></div>
      <div><label>經手人</label><select id="posStaff">${D.users.map(u=>`<option${u.id===D.currentUser.id?' selected':''}>${u.name}</option>`).join('')}</select></div></div>
    <div id="posTkInfo"></div>
    <div style="margin-top:10px;padding:10px;background:var(--bg3);border-radius:10px">
      <label>增值套票</label>
      <div style="display:flex;gap:8px"><input id="tkAmt" type="number" placeholder="金額..." inputmode="numeric" style="flex:1">
        <button class="btn btn-primary" style="flex:0;padding:10px 14px" onclick="addTk()">💳</button></div>
      <div id="tkResult"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">產品</div>
    <input id="posSearch" placeholder="🔍 搜尋..." oninput="renderProds()" style="margin-bottom:10px">
    <div class="prod-grid" id="prodList"></div>
  </div>

  <div class="card">
    <div class="card-title">購物車</div>
    <div id="cartList" style="margin-bottom:10px"><p style="color:var(--text3);font-size:12px;text-align:center;padding:12px 0">尚未加入</p></div>
    <div style="background:var(--bg3);border-radius:10px;padding:10px;margin-bottom:10px">
      <div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:4px"><span>小計</span><span id="posSub">$0</span></div>
      <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:700;color:var(--acc2)"><span>總計</span><span id="posTotal">$0</span></div>
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      <input id="posCash" type="number" placeholder="收款(HK$)" inputmode="numeric" oninput="updateChange()">
      <input id="posChange" placeholder="$0" disabled style="background:var(--bg4)">
    </div>
    <div style="display:flex;gap:8px;margin-bottom:10px">
      ${['現金','PayMe','轉數快','套票'].map(m=>`<button class="btn" style="flex:1;padding:10px;border:2px solid var(--border);background:transparent;color:var(--text2)" id="pay-${m}" onclick="selPay('${m}')">${m}</button>`).join('')}
    </div>
    <button class="btn btn-success btn-full" onclick="completeSale()">✅ 完成交易</button>
    <div id="saleResult"></div>
  </div>`;
  renderProds();
  renderPayBtns();
}

function addTk(){
  const ph=(document.getElementById('posPhone')||{}).value||'';
  const amt=parseInt((document.getElementById('tkAmt')||{}).value)||0;
  if(!ph||!amt){alert('請輸入電話及金額');return;}
  let cu=D.customers.find(c=>c.phone===ph);
  if(!cu){alert('找不到客人');return;}
  if(!cu.ticket)cu.ticket={balance:0};
  cu.ticket.balance+=amt;
  saveData();
  const r=document.getElementById('tkResult');if(r)r.innerHTML=`<div class="ok-box">✅ 增值 HK$${amt} 成功！餘額: HK$${cu.ticket.balance}</div>`;
  document.getElementById('tkAmt').value='';
  posAutoFill();
}

function renderPayBtns(){
  const payBtns=['現金','PayMe','轉數快','套票'];
  payBtns.forEach(m=>{
    const el=document.getElementById('pay-'+m);
    if(el)el.style.borderColor=D.selPay===m?'var(--acc)':'var(--border)';
  });
}

function selPay(m){D.selPay=m;renderPayBtns();}

function renderProds(){
  const q=(document.getElementById('posSearch')||{}).value.toLowerCase()||'';
  const f=D.products.filter(p=>!q||p.name.toLowerCase().includes(q)&&p.stock>0);
  const pl=document.getElementById('prodList');if(!pl)return;
  pl.innerHTML=f.map(p=>`<div class="prod-btn" onclick="addCart('${p.id}')" style="cursor:pointer"><div style="font-size:16px;margin-bottom:4px">📦</div><div style="font-size:11px">${p.name}</div><div style="font-size:11px;color:var(--acc2)">$${p.price}</div></div>`).join('');
}

function addCart(id){
  const p=D.products.find(x=>x.id===id);if(!p)return;
  const ex=D.cart.find(x=>x.id===id);
  if(ex)ex.qty++;else D.cart.push({id,name:p.name,price:p.price,qty:1});
  renderCart();
}

function updQty(id,d){
  const i=D.cart.findIndex(x=>x.id===id);if(i<0)return;
  D.cart[i].qty+=d;if(D.cart[i].qty<=0)D.cart.splice(i,1);renderCart();
}

function renderCart(){
  const cl=document.getElementById('cartList');if(!cl)return;
  if(!D.cart.length){cl.innerHTML='<p style="color:var(--text3);font-size:12px;text-align:center;padding:12px 0">尚未加入</p>';updateTotal();return;}
  cl.innerHTML=D.cart.map(i=>`<div class="cart-item">
    <div style="flex:1">${i.name}</div>
    <div style="display:flex;align-items:center;gap:4px">
      <button class="qty-btn" onclick="updQty('${i.id}',-1)" style="cursor:pointer">−</button>
      <span style="min-width:20px;text-align:center;font-size:12px;color:var(--text)">${i.qty}</span>
      <button class="qty-btn" onclick="updQty('${i.id}',1)" style="cursor:pointer">+</button>
    </div>
    <div style="min-width:50px;text-align:right;color:var(--acc2);font-weight:600;font-size:12px">$${i.price*i.qty}</div></div>`).join('');
  updateTotal();
}

function updateTotal(){
  const sub=D.cart.reduce((s,i)=>s+i.price*i.qty,0);
  if(document.getElementById('posSub'))document.getElementById('posSub').textContent='$'+sub;
  if(document.getElementById('posTotal'))document.getElementById('posTotal').textContent='$'+sub;
  updateChange();
}

function updateChange(){
  const te=document.getElementById('posTotal'),ce=document.getElementById('posCash'),ch=document.getElementById('posChange');
  if(!te||!ch)return;
  const total=parseInt(te.textContent.replace('$',''))||0;
  const cash=parseInt((ce||{}).value)||0;
  const r=cash-total;
  if(ch)ch.value='$'+(r>0?r:0);
}

function posAutoFill(){
  const ph=(document.getElementById('posPhone')||{}).value||'';
  const cu=D.customers.find(c=>c.phone===ph);
  if(cu){
    if(document.getElementById('posName'))document.getElementById('posName').value=cu.name;
    const ti=document.getElementById('posTkInfo');
    if(ti&&cu.ticket)ti.innerHTML=`<div style="font-size:12px;color:var(--text2);margin-top:6px">🎟 套票: <b>HK$${cu.ticket.balance}</b></div>`;
    else if(ti)ti.innerHTML='';
  }
}

function completeSale(){
  if(!D.cart.length){alert('購物車是空的');return;}
  const name=(document.getElementById('posName')||{}).value||'訪客';
  const phone=(document.getElementById('posPhone')||{}).value||'';
  const total=parseInt((document.getElementById('posTotal')||{}).textContent.replace('$',''))||0;
  const staff=(document.getElementById('posStaff')||{}).value;
  
  if(D.selPay==='套票'){
    const cu=D.customers.find(c=>c.phone===phone);
    if(!cu||!cu.ticket){alert('無套票');return;}
    if(cu.ticket.balance<total){alert('套票不足');return;}
    cu.ticket.balance-=total;
  }
  
  D.transactions.unshift({id:'T'+String(D.transactions.length+1).padStart(3,'0'),date:todayStr(),customer:name,phone,total,payment:D.selPay,staff});
  D.cart.forEach(ci=>{const p=D.products.find(x=>x.id===ci.id);if(p)p.stock-=ci.qty;});
  saveData();
  
  const sr=document.getElementById('saleResult');
  if(sr)sr.innerHTML=`<div class="ok-box">✅ 交易完成！$${total}</div>`;
  D.cart=[];renderCart();
}

function renderHistory(c){
  c.innerHTML=`<div class="card"><table><thead><tr><th>單號</th><th>客人</th><th>金額</th><th>付款</th></tr></thead><tbody>${D.transactions.slice(0,20).map(t=>`<tr><td>${t.id}</td><td>${t.customer}</td><td>$${t.total}</td><td>${t.payment}</td></tr>`).join('')||'<tr><td colspan="4" style="text-align:center;color:var(--text3);padding:16px">沒有紀錄</td></tr>'}</tbody></table></div>`;
}

function renderAppointments(c){
  c.innerHTML=`<div class="card">
    <div class="card-title">預約</div>
    ${D.appointments.map(a=>`<div style="padding:10px;background:var(--bg3);border-radius:10px;margin-bottom:6px">
      <div style="font-size:12px;color:var(--text)">${a.date} ${a.time} · ${a.customer}</div>
      <div style="font-size:11px;color:var(--text3);">${a.service}</div></div>`).join('')||'<p style="color:var(--text3);font-size:12px">沒有預約</p>'}
  </div>
  <div class="card">
    <div class="card-title">新增</div>
    <div class="grid2"><input id="apDt" type="date" value="${todayStr()}"><input id="apTm" type="time" value="10:00"></div>
    <div class="grid2"><input id="apNm" placeholder="客人"><input id="apSvc" placeholder="服務"></div>
    <button class="btn btn-primary btn-full" onclick="addAppt()">✅ 確認</button>
  </div>`;
}

function addAppt(){
  D.appointments.unshift({id:'A'+D.appointments.length+1,date:document.getElementById('apDt').value,time:document.getElementById('apTm').value,customer:document.getElementById('apNm').value||'未知',service:document.getElementById('apSvc').value||'服務'});
  saveData();
  nav('appointments');
}

function renderInventory(c){
  c.innerHTML=`<div class="card"><table><thead><tr><th>產品</th><th>庫存</th><th>售價</th></tr></thead><tbody>${D.products.map(p=>`<tr><td>${p.name}</td><td style="color:var(--green)">${p.stock}</td><td>$${p.price}</td></tr>`).join('')}</tbody></table></div>`;
}

function renderCustomers(c){
  c.innerHTML=`<div class="card"><table><thead><tr><th>客人</th><th>電話</th><th>套票</th></tr></thead><tbody>${D.customers.map(cu=>`<tr><td>${cu.name}</td><td>${cu.phone}</td><td>${cu.ticket?'HK$'+cu.ticket.balance:'無'}</td></tr>`).join('')}</tbody></table></div>`;
}

function renderTickets(c){
  c.innerHTML=`<div class="card">
    ${D.customers.filter(cu=>cu.ticket).map(cu=>`<div style="padding:10px;background:var(--bg3);border-radius:10px;margin-bottom:6px;display:flex;justify-content:space-between">
      <div style="font-size:12px;color:var(--text)">${cu.name}</div>
      <div style="font-size:13px;font-weight:600;color:var(--green)">HK$${cu.ticket.balance}</div>
    </div>`).join('')||'<p style="color:var(--text3);font-size:12px">沒有套票客人</p>'}
  </div>`;
}

function renderExpenses(c){
  c.innerHTML=`<div class="card"><div class="card-title">支出管理</div><p style="color:var(--text3)">支出功能</p></div>`;
}

function renderSettings(c){
  c.innerHTML=`
  <div class="card">
    <div class="card-title">👤 更改用戶密碼</div>
    ${D.users.map(u=>`<div style="padding:12px;background:var(--bg3);border-radius:10px;margin-bottom:8px">
      <div style="font-size:12px;font-weight:600;color:var(--text)">${u.name}</div>
      <div style="display:flex;gap:8px;margin-top:8px">
        <input type="password" id="pwd${u.id}" value="${u.pwd}" style="flex:1;font-size:12px">
        <button class="btn btn-primary" style="padding:8px 12px" onclick="changePwd(${u.id})">更新</button>
      </div>
    </div>`).join('')}
  </div>
  
  <div class="card">
    <div class="card-title">💾 數據同步</div>
    <div style="padding:12px;background:var(--bg3);border-radius:10px;color:var(--text3);font-size:11px;line-height:1.6">
      ✅ <b>所有數據已自動保存到此設備</b><br>
      🔄 <b>多設備同步方法：</b><br>
      1️⃣ 在其他手機/電腦上訪問此網址<br>
      2️⃣ 用相同密碼登入<br>
      3️⃣ 所有數據會自動同步<br><br>
      <b>網址：</b> https://icare745.github.io/
    </div>
  </div>`;
}

function changePwd(uid){
  const newPwd=document.getElementById('pwd'+uid).value;
  const u=D.users.find(x=>x.id===uid);
  if(u){
    u.pwd=newPwd;
    saveData();
    alert(`✅ ${u.name} 密碼已更新！`);
  }
}

function closeMore(){document.getElementById('modalContainer').innerHTML='';}
</script>
</body>
</html>
