<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="PawPOS">
<title>PawPOS 升級版</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quagga@0.12.1/dist/quagga.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+HK:wght@400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0c0e18;--bg2:#141720;--bg3:#1e2133;--bg4:#272b40;
  --acc:#6c63ff;--acc2:#9b94ff;--acc3:#4a42cc;
  --text:#eceaff;--text2:#9390bf;--text3:#5e5c85;
  --border:#2e3150;--border2:#404468;
  --green:#3ddc84;--red:#ff6b6b;--amber:#ffb86c;
}
body{font-family:'Noto Sans HK',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column}
.header{padding:15px;background:var(--bg2);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.main{flex:1;overflow-y:auto;padding:15px;padding-bottom:100px}
.nav{position:fixed;bottom:0;width:100%;background:var(--bg2);display:flex;border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom)}
.nav-item{flex:1;padding:15px;text-align:center;color:var(--text2);font-size:12px}
.nav-item.active{color:var(--acc);font-weight:600}
.btn{padding:12px;border:none;border-radius:12px;font-weight:600;cursor:pointer;transition:0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary{background:var(--acc);color:#fff}
.btn-full{width:100%;margin-bottom:10px}
.card{background:var(--bg2);border-radius:16px;padding:15px;margin-bottom:15px;border:1px solid var(--border)}
.product-item{display:flex;justify-content:space-between;align-items:center;padding:12px;background:var(--bg3);border-radius:12px;margin-bottom:8px}
input,select{width:100%;padding:12px;margin-bottom:10px;border-radius:8px;border:1px solid var(--border);background:var(--bg4);color:#fff;outline:none}
#scanner{width:100%;height:200px;background:#000;border-radius:12px;overflow:hidden;margin-bottom:15px;display:none;position:relative}
#scanner video{width:100%;height:100%;object-fit:cover}
.tag{display:inline-block;padding:4px 10px;background:var(--bg4);border-radius:20px;font-size:12px;margin:2px}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-content{background:var(--bg2);width:100%;max-width:400px;border-radius:20px;padding:20px;max-height:80vh;overflow-y:auto}
</style>
</head>
<body>

<div class="header">
    <h2 id="pageTitle">PawPOS 銷售</h2>
    <div id="cartStatus" onclick="switchTab('cart')">🛒 <span id="cartCount">0</span></div>
</div>

<div class="main" id="app"></div>

<div class="nav">
    <div class="nav-item active" onclick="switchTab('pos')">🏠 銷售</div>
    <div class="nav-item" onclick="switchTab('history')">📜 紀錄</div>
    <div class="nav-item" onclick="switchTab('admin')">⚙️ 管理</div>
</div>

<div class="modal" id="modal">
    <div class="modal-content" id="modalBody"></div>
</div>

<script>
// --- 初始化資料 ---
let D = JSON.parse(localStorage.getItem('PawPOS_Data')) || {
    products: [],
    sales: [],
    categories: ['預設'],
    payMethods: ['現金', 'PayMe', '轉數快'],
    cart: []
};

function save() { localStorage.setItem('PawPOS_Data', JSON.stringify(D)); }

let currentTab = 'pos';

// --- 路由切換 ---
function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.nav-item').forEach((el, i) => {
        el.classList.toggle('active', ['pos','history','admin'][i] === tab);
    });
    render();
}

function render() {
    const app = document.getElementById('app');
    const title = document.getElementById('pageTitle');
    document.getElementById('cartCount').innerText = D.cart.length;

    if (currentTab === 'pos') {
        title.innerText = "PawPOS 銷售";
        renderPOS(app);
    } else if (currentTab === 'history') {
        title.innerText = "銷售紀錄";
        renderHistory(app);
    } else if (currentTab === 'admin') {
        title.innerText = "系統管理";
        renderAdmin(app);
    }
}

// --- 銷售介面 ---
function renderPOS(el) {
    el.innerHTML = `
        <div id="scanner"></div>
        <button class="btn btn-primary btn-full" onclick="toggleScanner()">📷 掃描條碼</button>
        <input type="text" id="search" placeholder="搜尋產品或掃描..." oninput="renderProductList()">
        <div id="productList"></div>
    `;
    renderProductList();
}

function renderProductList() {
    const q = document.getElementById('search').value.toLowerCase();
    const list = document.getElementById('productList');
    const filtered = D.products.filter(p => p.name.toLowerCase().includes(q) || p.code.includes(q));
    
    list.innerHTML = filtered.map(p => `
        <div class="product-item" onclick="addToCart('${p.id}')">
            <div>
                <strong>${p.name}</strong><br>
                <small>$${p.price} | 庫存: ${p.stock}</small>
            </div>
            <div style="color:var(--acc)">➕</div>
        </div>
    `).join('');
}

// --- 掃描功能優化 ---
let scanning = false;
function toggleScanner() {
    const s = document.getElementById('scanner');
    if (!scanning) {
        s.style.display = 'block';
        Quagga.init({
            inputStream: { name: "Live", type: "LiveStream", target: s, constraints: { facingMode: "environment" } },
            decoder: { readers: ["ean_reader", "code_128_reader", "upc_reader", "code_39_reader"] },
            locate: true
        }, (err) => {
            if (err) return alert("相機啟動失敗");
            Quagga.start();
            scanning = true;
        });
        Quagga.onDetected(res => {
            document.getElementById('search').value = res.codeResult.code;
            toggleScanner();
            renderProductList();
            // 如果只有一個結果，自動加入購物車
            const filtered = D.products.filter(p => p.code === res.codeResult.code);
            if(filtered.length === 1) addToCart(filtered[0].id);
        });
    } else {
        Quagga.stop();
        s.style.display = 'none';
        scanning = false;
    }
}

// --- 購物車與結帳 ---
function addToCart(id) {
    const p = D.products.find(x => x.id === id);
    if (p.stock <= 0) return alert("庫存不足");
    D.cart.push({...p});
    render();
}

// --- 紀錄與 Excel 匯出 ---
function renderHistory(el) {
    el.innerHTML = `
        <button class="btn btn-primary btn-full" onclick="exportToExcel()" style="background:var(--green);color:#000">📊 匯出 Excel 報表</button>
        ${D.sales.reverse().map(s => `
            <div class="card">
                <div style="display:flex;justify-content:space-between">
                    <strong>${s.date}</strong>
                    <span style="color:var(--green)">$${s.total}</span>
                </div>
                <small>${s.items.map(i => i.name).join(', ')}</small><br>
                <small>支付: ${s.payBy}</small>
            </div>
        `).join('')}
    `;
}

// --- 產品編輯功能 ---
function renderAdmin(el) {
    el.innerHTML = `
        <div class="card">
            <h3>🆕 新增產品</h3>
            <input id="p_name" placeholder="產品名稱">
            <input id="p_price" type="number" placeholder="售價">
            <input id="p_stock" type="number" placeholder="庫存數量">
            <input id="p_code" placeholder="條碼 (可選)">
            <button class="btn btn-primary btn-full" onclick="addProduct()">儲存產品</button>
        </div>
        <h3>📦 現有產品 (點擊📝修改)</h3>
        <div id="adminList"></div>
    `;
    const list = document.getElementById('adminList');
    list.innerHTML = D.products.map(p => `
        <div class="product-item">
            <div>
                <strong>${p.name}</strong><br>
                <small>$${p.price} | 庫存: ${p.stock} | 條碼: ${p.code || '無'}</small>
            </div>
            <button class="btn" onclick="editProduct('${p.id}')" style="background:var(--bg4);padding:5px">📝編輯</button>
        </div>
    `).join('');
}

function addProduct() {
    const name = document.getElementById('p_name').value;
    const price = document.getElementById('p_price').value;
    const stock = document.getElementById('p_stock').value;
    const code = document.getElementById('p_code').value;
    if(!name || !price) return alert("請填寫名稱和價格");
    
    D.products.push({ id: Date.now().toString(), name, price: parseFloat(price), stock: parseInt(stock), code });
    save();
    renderAdmin(document.getElementById('app'));
}

function editProduct(id) {
    const p = D.products.find(x => x.id === id);
    const newName = prompt("修改名稱:", p.name);
    if (newName === null) return;
    const newPrice = prompt("修改價格:", p.price);
    const newStock = prompt("修改庫存:", p.stock);
    const newCode = prompt("修改條碼:", p.code || "");

    p.name = newName;
    p.price = parseFloat(newPrice) || 0;
    p.stock = parseInt(newStock) || 0;
    p.code = newCode;
    
    save();
    render();
}

// --- 匯出 Excel 核心功能 ---
function exportToExcel() {
    if (D.sales.length === 0) return alert("沒有銷售紀錄可匯出");

    // 1. 準備產品工作表
    const ws_products = XLSX.utils.json_to_sheet(D.products);
    
    // 2. 準備銷售紀錄工作表 (攤平資料)
    const salesFlat = D.sales.map(s => ({
        日期: s.date,
        總額: s.total,
        支付方式: s.payBy,
        購買項目: s.items.map(i => i.name).join(', ')
    }));
    const ws_sales = XLSX.utils.json_to_sheet(salesFlat);

    // 3. 建立活頁簿
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws_products, "庫存清單");
    XLSX.utils.book_append_sheet(wb, ws_sales, "銷售紀錄");

    // 4. 下載檔案
    XLSX.writeFile(wb, `PawPOS_Report_${new Date().toLocaleDateString()}.xlsx`);
}

// 初始渲染
render();
</script>
</body>
</html>
